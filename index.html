<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Портал «Music Box» Vaideska</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <section class="section-head">
    <header>
      <div class="logo"><img src="images/logo.svg" alt="logo Music Box"><span>Music Box</span></div>
      <ul class="menu">
        <li>Контакты</li>
        <li>Исполнители</li>
        <li>Каталог</li>
        <li>Главная</li>
      </ul>
      <input type="text" name="search" placeholder="Поиск">
    </header>
    <div class="banner">
      <h1>Онлайн музыка где угодно</h1>
      <h2>Без ограничений</h2>
      <p class="font-size-1">Получите доступ всего за несколько шагов. Заполните форму ниже и откройте мир музыки</p>
      <form>
        <input type="text" name="name" placeholder="Имя">
        <input type="text" name="email" placeholder="Email">
        <button>Получить доступ</button>
      </form>
    </div>
  </section>

</body>
</html>
